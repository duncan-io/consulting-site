# Cloudflare Pages — static Next.js export (`next.config.ts` uses `output: "export"`).
#
# Primary path: connect this GitHub repo in the Cloudflare dashboard (GitHub = source only;
# Cloudflare clones, runs the build, and publishes). Workers & Pages → Pages → your project
# → Build settings, or import repo when creating the project. Official guide:
# https://developers.cloudflare.com/pages/framework-guides/nextjs/deploy-a-static-nextjs-site/
#
#   Framework preset: "Next.js (Static HTML Export)" (or match manually):
#   Build command:     bun run build   (or npm run build; use the same package manager as the lockfile)
#   Build output:      out             (must match `pages_build_output_dir` below)
#   "Deploy" step:   leave empty (recommended). After a successful build, Pages uploads `out`
#                    automatically. If you set a custom deploy command, do not use bare `wrangler`:
#                    the CLI is only in `node_modules/.bin`, so you get `wrangler: not found`.
#                    Use `bunx wrangler pages deploy out` instead, or `bun run pages:deploy`.
#   Do not use        `wrangler deploy` here — that targets Workers and will fail (no worker entry).
#
# Optional: direct upload / one-off deploy from a machine (not the default for Git-connected Pages):
#   `bunx wrangler pages deploy out`  or  `bun run pages:deploy`  (not `wrangler deploy`).
#
# If the build image ignores .nvmrc, set NODE_VERSION=22 in Pages → Environment variables → Build.

name = "duncan-consultant"
compatibility_date = "2025-04-01"
# Next `output: "export"` writes here; keep in sync with Pages → Build output directory.
pages_build_output_dir = "out"
